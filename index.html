// ── Fade-in component ─────────────────────────────────────────────────────────
function F({ children, d = 0 }) {
  const r = useRef(null); const [v, sv] = useState(false);
  useEffect(() => { const o = new IntersectionObserver(([e]) => e.isIntersecting && sv(true), { threshold: 0.06 }); r.current && o.observe(r.current); return () => o.disconnect(); }, []);
  return <div ref={r} style={{ opacity:v?1:0, transform:v?"none":"translateY(16px)", transition:`opacity .55s ease ${d}ms, transform .55s ease ${d}ms` }}>{children}</div>;
}

function Num({ value, prefix="", suffix="", ms=1600 }) {
  const [d, sd] = useState(0); const r = useRef(null), go = useRef(false);
  useEffect(() => { const o = new IntersectionObserver(([e]) => { if (e.isIntersecting && !go.current) { go.current = true; const s = performance.now(); const f = n => { const p = Math.min((n-s)/ms,1); sd((1-Math.pow(1-p,3))*value); p<1 && requestAnimationFrame(f); }; requestAnimationFrame(f); } }, { threshold:.3 }); r.current && o.observe(r.current); return () => o.disconnect(); }, [value, ms]);
  return <span ref={r}>{prefix}{Math.round(d).toLocaleString("en-US")}{suffix}</span>;
}

function Sev({ l }) {
  const m = { Crit:C.red, High:C.amber, Med:C.blue, Low:C.muted }; const c = m[l]||C.muted;
  return <span style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, letterSpacing:".06em", padding:"2px 8px", borderRadius:3, color:c, background:c+"16", border:`1px solid ${c}25` }}>{l}</span>;
}

function KV({ k, v, mono=false }) {
  return <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"9px 0", borderBottom:`1px solid ${C.border}` }}>
    <span style={{ fontSize:13, color:C.dim }}>{k}</span>
    <span style={{ fontSize:13, color:C.white, fontWeight:600, fontFamily:mono?C.mono:C.sans }}>{v}</span>
  </div>;
}

function Tag({ children, color=C.green }) {
  return <span style={{ fontSize:10, fontWeight:600, fontFamily:C.mono, letterSpacing:".04em", padding:"2px 9px", borderRadius:3, color, background:color+"12", border:`1px solid ${color}20`, whiteSpace:"nowrap" }}>{children}</span>;

function PF({ title, num }) {

function Logo({ name, w=100, h=32, light=false }) {
  const [status, setStatus] = useState("loading");
  const fallback = name.replace(/[-_]/g," ").replace(/\.\w+$/,"");
  return <div style={{ width:w, height:h, borderRadius:4, overflow:"hidden", position:"relative", display:"flex", alignItems:"center", justifyContent:"center", background: light ? "rgba(255,255,255,0.9)" : "transparent", padding: light ? "3px 6px" : 0 }}>
    {status !== "error" && <img src={"./" + name} alt={fallback} onLoad={() => setStatus("ok")} onError={() => setStatus("error")} style={{ maxWidth:"100%", maxHeight:"100%", objectFit:"contain", display:"block", opacity: status==="ok" ? 1 : 0, transition:"opacity .3s" }}/>}
    {status === "error" && <span style={{ fontSize:9, fontWeight:700, fontFamily:C.mono, color:C.faint, letterSpacing:".08em", textTransform:"uppercase" }}>{fallback}</span>}
  </div>;
}

                <div style={{ fontSize:12, color:C.dim, lineHeight:1.55 }}>{b.desc}</div>
              </div>
            )}
          </div>
        </F>
        <F d={400}><div style={{ fontSize:11, color:C.muted, marginTop:28 }}>{t.cover_footer.split("\n").map((l,i)=><div key={i}>{l}</div>)}</div></F>
        <PF title={t.pf1} num="01"/>
      </Page>

{/* ═══ 02 — DATASET ═══ */}
      <Page id="s2">
        <SH num="02" title={t.s2_title} sub={t.s2_sub}/>
        <F>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:24, marginBottom:28 }}>
            <div style={{ display:"flex", alignItems:"flex-start", gap:20, marginBottom:16 }}>
              <Logo name="petrobras.png" w={120} h={48} light/>
              <div>
                <h3 style={{ fontSize:16, fontWeight:700, color:C.white, margin:"0 0 10px" }}>{t.s2_origin_title}</h3>
                <p style={{ fontSize:13, color:C.text, lineHeight:1.7, margin:0 }}>{t.s2_origin_body}</p>
              </div>
            </div>
            <p style={{ fontSize:11, color:C.muted, margin:0, lineHeight:1.6 }}>{t.s2_disclaimer}</p>
          </div>
        </F>
        <F d={80}>
          <div className="g2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:28 }}>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:22 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.muted, letterSpacing:".1em", marginBottom:14 }}>{t.composicion}</div>
              {[[t.kv_total,t.kv_total_v],[t.kv_normal,t.kv_normal_v],[t.kv_anomal,t.kv_anomal_v],[t.kv_canales,t.kv_canales_v],[t.kv_interval,t.kv_interval_v],[t.kv_fallas_labeled,t.kv_fallas_labeled_v],[t.kv_instances,t.kv_instances_v],[t.kv_simulated,t.kv_simulated_v]].map(([k,v],i) => <KV key={i} k={k} v={v} mono/>)}
            </div>
            <div>
              <div style={{ background:C.greenDim, border:`1px solid ${C.green}18`, borderRadius:8, padding:22, marginBottom:16 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green, letterSpacing:".1em", marginBottom:10 }}>{t.hallazgo}</div>
                <p style={{ fontSize:18, fontWeight:700, color:C.white, margin:"0 0 8px", lineHeight:1.35 }}>{t.hallazgo_h}</p>
                <p style={{ fontSize:12, color:C.text, margin:0, lineHeight:1.65 }}>{t.hallazgo_body}</p>
              </div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
                <div style={{ fontSize:10, color:C.muted, marginBottom:8 }}>{t.dist_label}</div>
                <div style={{ display:"flex", borderRadius:4, overflow:"hidden", height:28 }}>
                  <div style={{ width:"37%", background:C.green+"28", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green }}>37.0%</div>
                  <div style={{ width:"63%", background:C.red+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.red }}>63.0%</div>
                </div>
                <div style={{ display:"flex", justifyContent:"space-between", marginTop:6, fontSize:10, color:C.dim }}>
                  <span>{t.normal_label}</span><span>{t.fault_label}</span>
                </div>
              </div>
              <div style={{ marginTop:12, padding:"10px 14px", background:C.surface, border:`1px solid ${C.border}`, borderRadius:6 }}>
                <p style={{ fontSize:11, color:C.muted, margin:0, lineHeight:1.6 }}><strong style={{ color:C.dim }}>{t.imbalance_note_label}</strong> {t.imbalance_note}</p>
              </div>
            </div>
          </div>
        </F>
        <PF title={t.pf2} num="02"/>
      </Page>

{/* ═══ 03 — DATA TYPES ═══ */}
      <Page id="s3">
        <SH num="03" title={t.s3_title} sub={t.s3_sub}/>
        <F>
          <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:14 }}>{t.pres_label}</div>
          <div className="g2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:16, marginBottom:28 }}>
            <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
              <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.blue, letterSpacing:".1em", marginBottom:12 }}>{t.pres_title}</div>
              {t.pres_items.map(([c,d],i) =>
                <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                  <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.blue }}>{c}</code>
                  <span style={{ fontSize:11, color:C.dim, textAlign:"right" }}>{d}</span>
                </div>
              )}
            </div>
            <div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18, marginBottom:12 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.amber, letterSpacing:".1em", marginBottom:12 }}>{t.temp_title}</div>
                {t.temp_items.map(([c,d],i) =>
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                    <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.amber }}>{c}</code>
                    <span style={{ fontSize:11, color:C.dim }}>{d}</span>
                  </div>
                )}
              </div>
              <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:18 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.green, letterSpacing:".1em", marginBottom:12 }}>{t.flow_title}</div>
                {t.flow_items.map(([c,d],i) =>
                  <div key={i} style={{ display:"flex", justifyContent:"space-between", padding:"4px 0", borderBottom:`1px solid ${C.border}` }}>
                    <code style={{ fontSize:11, fontFamily:C.mono, fontWeight:700, color:C.green }}>{c}</code>
                    <span style={{ fontSize:11, color:C.dim }}>{d}</span>
                  </div>
                )}
              </div>
            </div>
          </div>
        </F>
        <F d={80}>
          <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:14 }}>{t.valves_label}</div>
          <div className="g3" style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:12, marginBottom:28 }}>
            {t.valve_groups.map((g,gi) =>
              <div key={gi} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:16 }}>
                <div style={{ fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.dim, letterSpacing:".06em", marginBottom:10 }}>{g.h}</div>
                {g.items.map(([code,name,desc],i) =>
                  <div key={i} style={{ marginBottom:8, paddingBottom:8, borderBottom:i<g.items.length-1?`1px solid ${C.border}`:"none" }}>
                    <code style={{ fontSize:10, fontFamily:C.mono, fontWeight:700, color:C.green }}>{code}</code>
                    <div style={{ fontSize:12, fontWeight:600, color:C.text, marginTop:2 }}>{name}</div>
                    <div style={{ fontSize:11, color:C.muted, marginTop:1 }}>{desc}</div>
                  </div>
                )}
              </div>
            )}
          </div>
        </F>
        <F d={160}>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:22 }}>
            <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:14 }}>{t.regime_title}</div>
            <div className="g2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:18, fontSize:13, color:C.text, lineHeight:1.65, marginBottom:14 }}>
              <div><strong style={{ color:C.white }}>{t.regime_q1}</strong><br/>{t.regime_a1}</div>
              <div><strong style={{ color:C.white }}>{t.regime_q2}</strong><br/>{t.regime_a2}</div>
            </div>
            <div style={{ fontSize:12, color:C.text, marginBottom:10, lineHeight:1.6 }}>
              <strong style={{ color:C.white }}>{t.regime_build_label}</strong> {t.regime_build}
            </div>
            <div style={{ padding:"8px 14px", background:C.bg, borderRadius:4, fontFamily:C.mono, fontSize:11, color:C.green }}>ESTADO-M1=1, M2=0, ABER-CKP=1, CKGL=0</div>
          </div>
        </F>
        <PF title={t.pf3} num="03"/>
      </Page>

{/* ═══ 04 — FAULT CLASSIFICATION ═══ */}
      <Page id="s4">
        <SH num="04" title={t.s4_title} sub={t.s4_sub}/>
        <F>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, overflowX:"auto", marginBottom:28 }}>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
              <thead><tr style={{ borderBottom:`1px solid ${C.border2}` }}>
                {t.table_heads.map((h,i) => <th key={i} style={{ padding:"10px 14px", textAlign:"left", fontSize:10, fontWeight:700, fontFamily:C.mono, color:C.muted, letterSpacing:".06em" }}>{h}</th>)}
              </tr></thead>
              <tbody>
                {t.fault_rows.map(([n,name,rows,pct,sev],i) =>
                  <tr key={i} style={{ borderBottom:`1px solid ${C.border}`, background:i===0?C.greenDim:"transparent" }}>
                    <td style={{ padding:"9px 14px", fontFamily:C.mono, fontWeight:700, color:i===0?C.green:C.muted, fontSize:11 }}>{n}</td>
                    <td style={{ padding:"9px 14px" }}><span style={{ color:C.white, fontWeight:600, fontSize:13 }}>{name}</span><br/><span style={{ fontSize:10, fontFamily:C.mono, color:C.muted }}>{rows} {t.fault_rows_suffix}</span></td>
                    <td style={{ padding:"9px 14px", width:70 }}><div style={{ width:55, height:5, background:C.border, borderRadius:3, overflow:"hidden" }}><div style={{ width:`${Math.min(parseFloat(pct)*2.7,100)}%`, height:"100%", background:i===0?C.green:C.red, borderRadius:3 }}/></div></td>
                    <td style={{ padding:"9px 14px", fontFamily:C.mono, fontSize:11, color:C.text }}>{pct}</td>
                    <td style={{ padding:"9px 14px" }}>{sev==="—"?<span style={{ color:C.muted }}>—</span>:<Sev l={sev}/>}</td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </F>
        <F d={80}>
          <div style={{ fontSize:14, fontWeight:700, color:C.white, marginBottom:12 }}>{t.fault_desc_title}</div>
          <div className="g2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
            {t.fault_descs.map(([title,desc],i) =>
              <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:6, padding:14 }}>
                <div style={{ fontSize:11, fontWeight:700, fontFamily:C.mono, color:faultDescColors[i], marginBottom:4 }}>{title}</div>
                <p style={{ fontSize:12, color:C.dim, margin:0, lineHeight:1.55 }}>{desc}</p>
              </div>
            )}
          </div>
        </F>
        <PF title={t.pf4} num="04"/>
      </Page>

{/* ═══ 05 — PROCESSING METHODOLOGY ═══ */}
      <Page id="s5">
        <SH num="05" title={t.s5_title} sub={t.s5_sub}/>
        {t.processing_steps.map((s,i) =>
          <F key={i} d={i*70}>
            <div style={{ display:"grid", gridTemplateColumns:"46px 1fr", gap:14, marginBottom:24 }}>
              <div style={{ width:46, height:46, borderRadius:8, background:stepColors[i]+"12", border:`1px solid ${stepColors[i]}28`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, fontFamily:C.mono, color:stepColors[i] }}>{s.n}</div>
              <div>
                <h4 style={{ fontSize:14, fontWeight:700, color:C.white, margin:"0 0 6px" }}>{s.t}</h4>
                <p style={{ fontSize:12, color:C.text, margin:"0 0 8px", lineHeight:1.6 }}>{s.d}</p>
                <div style={{ display:"flex", gap:5, flexWrap:"wrap" }}>{s.tags.map((tag,j) => <Tag key={j} color={stepColors[i]}>{tag}</Tag>)}</div>
              </div>
            </div>
          </F>
        )}
        <PF title={t.pf5} num="05"/>
      </Page>

{/* ═══ 06 — DETECTION ARCHITECTURE ═══ */}
      <Page id="s6">
        <SH num="06" title={t.s6_title} sub={t.s6_sub}/>
        <F>
          <p style={{ fontSize:13, color:C.text, lineHeight:1.75, marginBottom:28 }}>
            {t.s6_intro[0]}<strong style={{ color:C.white }}>{t.s6_intro[1]}</strong>{t.s6_intro[2]}<strong style={{ color:C.white }}>{t.s6_intro[3]}</strong>{t.s6_intro[4]}
          </p>
        </F>
        <F d={80}>
          <div className="g3" style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12, marginBottom:28 }}>
            {t.layers.map((ly,i) =>
              <div key={i} style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <span style={{ fontSize:10, fontWeight:800, fontFamily:C.mono, padding:"2px 7px", borderRadius:3, background:layerColors[i]+"16", color:layerColors[i], border:`1px solid ${layerColors[i]}28` }}>{t.layer_label} {ly.n}</span>
                  <span style={{ fontSize:15, fontWeight:700, color:C.white }}>{ly.l}</span>
                </div>
                <div style={{ fontSize:12, fontWeight:600, color:C.dim, marginBottom:4 }}>{ly.sub}</div>
                <div style={{ fontSize:11, color:layerColors[i], fontStyle:"italic", marginBottom:14, lineHeight:1.5 }}>"{ly.q}"</div>
                {ly.rows.map(([k,v],j) =>
                  <div key={j} style={{ display:"flex", justifyContent:"space-between", padding:"5px 0", borderBottom:`1px solid ${C.border}` }}>
                    <span style={{ fontSize:10, fontFamily:C.mono, color:C.muted }}>{k}</span>
                    <span style={{ fontSize:10, color:C.text, fontWeight:600, textAlign:"right" }}>{v}</span>
                  </div>
                )}
              </div>
            )}
          </div>
        </F>
        <F d={160}>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, padding:"14px 18px", overflowX:"auto" }}>
            <div className="gflow" style={{ display:"flex", alignItems:"center", gap:5, justifyContent:"center", flexWrap:"nowrap", minWidth:600 }}>
              {t.flow_nodes.map((s,i) =>
                <div key={i} style={{ display:"flex", alignItems:"center", gap:5 }}>
                  <div style={{ padding:"6px 11px", borderRadius:4, fontSize:10, fontWeight:600, fontFamily:C.mono, whiteSpace:"nowrap", background:i===0||i===5?C.green+"16":C.card, color:i===0||i===5?C.green:C.text, border:`1px solid ${i===0||i===5?C.green+"30":C.border}` }}>{s}</div>
                  {i<5 && <span style={{ color:C.faint, fontSize:11 }}>→</span>}
                </div>
              )}
            </div>
          </div>
        </F>
        <PF title={t.pf6} num="06"/>
      </Page>

{/* ═══ 07 — RESULTS ═══ */}
      <Page id="s7">
        <SH num="07" title={t.s7_title} sub={t.s7_sub}/>
        <F>
          <div className="g2" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:20, marginBottom:28 }}>
            <div style={{ background:C.outBg, border:`1px solid ${C.green}20`, borderRadius:8, padding:28, textAlign:"center" }}>
              <div className="gmetric" style={{ fontSize:38, fontWeight:800, fontFamily:C.mono, color:C.green, marginBottom:6 }}>{t.s7_metric1}</div>
              <div style={{ fontSize:15, fontWeight:700, color:C.white }}>{t.s7_label1}</div>
            </div>
            <div style={{ background:C.outBg, border:`1px solid ${C.blue}20`, borderRadius:8, padding:28, textAlign:"center" }}>
              <div className="gmetric" style={{ fontSize:38, fontWeight:800, fontFamily:C.mono, color:C.blue, marginBottom:6 }}>{t.s7_metric2}</div>
              <div style={{ fontSize:15, fontWeight:700, color:C.white }}>{t.s7_label2}</div>
            </div>
          </div>
        </F>
        <F d={80}>
          <div style={{ background:C.surface, border:`1px solid ${C.border}`, borderRadius:8, overflowX:"auto" }}>
            <div style={{ padding:"12px 18px", borderBottom:`1px solid ${C.border}` }}><span style={{ fontSize:13, fontWeight:700, color:C.white }}>{t.impact_table_title}</span></div>
            <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
              <thead><tr style={{ borderBottom:`1px solid ${C.border2}` }}>
                {t.impact_heads.map((h,i) => <th key={i} style={{ padding:"8px 12px", textAlign:"left", fontSize:9, fontWeight:700, fontFamily:C.mono, color:C.muted }}>{h}</th>)}
              </tr></thead>
              <tbody>
                {t.impact_rows.map((r,i) =>
                  <tr key={i} style={{ borderBottom:`1px solid ${C.border}` }}>
                    <td style={{ padding:"8px 12px", color:C.white, fontWeight:600 }}>{r[0]}</td>
                    <td style={{ padding:"8px 12px", fontFamily:C.mono, color:C.text }}>{r[1]}</td>
                    <td style={{ padding:"8px 12px", color:C.dim, maxWidth:200 }}>{r[2]}</td>
                    <td style={{ padding:"8px 12px", fontFamily:C.mono, color:C.green, fontWeight:700 }}>{r[3]}</td>
                    <td style={{ padding:"8px 12px" }}><Sev l={r[4]}/></td>
                    <td style={{ padding:"8px 12px" }}><Sev l={r[5]}/></td>
                  </tr>
                )}
              </tbody>
            </table>
          </div>
        </F>
        <PF title={t.pf7} num="07"/>
      </Page>

{/* ═══ 08 — FAQ ═══ */}
      <Page id="s8">
        <SH num="08" title={t.s8_title} sub={t.s8_sub}/>
        {t.faqs.map((item,i) =>
          <F key={i} d={i * 50}>
            <div style={{ marginBottom: 16, background: C.surface, border: `1px solid ${C.border}`, borderRadius: 8, padding: "20px 24px" }}>
              <div style={{ display: "flex", alignItems: "flex-start", gap: 14 }}>
                <div style={{ width: 28, height: 28, borderRadius: 6, background: faqColors[i] + "12", border: `1px solid ${faqColors[i]}28`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 800, fontFamily: C.mono, color: faqColors[i], flexShrink: 0, marginTop: 2 }}>{"0" + (i + 1)}</div>
                <div style={{ flex: 1 }}>
                  <h4 style={{ fontSize: 14, fontWeight: 700, color: C.white, margin: "0 0 8px", lineHeight: 1.4 }}>{item.q}</h4>
                  <p style={{ fontSize: 12, color: C.text, margin: 0, lineHeight: 1.7 }}>{item.a}</p>
                </div>
              </div>
            </div>
          </F>
        )}
        <PF title={t.pf8} num="08"/>
      </Page>

{/* ═══ FOOTER ═══ */}
      <footer style={{ borderTop:`1px solid ${C.border}`, padding:"44px 24px", background:C.page }}>
        <div style={{ maxWidth:880, margin:"0 auto", textAlign:"center" }}>
          <div style={{ fontSize:18, fontWeight:800, fontFamily:C.mono, color:C.green, letterSpacing:".06em", marginBottom:4 }}>VÖRNTEC</div>
          <div style={{ fontSize:12, color:C.dim, marginBottom:28 }}>{t.footer_sub}</div>
          <div style={{ display:"flex", justifyContent:"center", gap:28, marginBottom:28 }}>
            {t.footer_stats.map(([v,l],i) =>
              <div key={i}><div style={{ fontSize:16, fontWeight:800, fontFamily:C.mono, color:C.green }}>{v}</div><div style={{ fontSize:10, color:C.muted }}>{l}</div></div>
            )}
          </div>
          <div style={{ borderTop:`1px solid ${C.border}`, paddingTop:20, marginBottom:20 }}>
            <div style={{ fontSize:9, fontWeight:700, fontFamily:C.mono, color:C.faint, letterSpacing:".12em", marginBottom:14 }}>{t.footer_ecosystem}</div>
            <div style={{ display:"flex", justifyContent:"center", gap:16 }}>
              <Logo name="bgv.png" w={90} h={28} light/>
              <Logo name="ignite.png" w={90} h={28} light/>
              <Logo name="nvidia.png" w={120} h={28} light/>
            </div>
          </div>
          <div style={{ fontSize:10, color:C.faint }}>{t.footer_conf}</div>
        </div>
      </footer>
    </div>
    </LangCtx.Provider>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
  </script>
</body>
</html>
